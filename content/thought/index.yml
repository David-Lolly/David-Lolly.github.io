items:
  - date: "2025/10/26"
    tag: "自我关怀"
    note: "爱自己是别人爱你的前提。"
    content: |
      学会爱自己，对方往往会以你爱自己的方式来爱你

  - date: "2025/10/27"
    tag: "学习与成长"
    note: "学习的本质是自我提升。"
    content: |
      所有的学习，并不是让身边的人去改变去进步，而是你自己进步。

  - date: "2025/10/29"
    tag: "自我觉察"
    note: "在关系中保持松弛感以更好地认识自己。"
    content: |
      保持放松，让自己先放松下来，在关系中慢慢的来看见自己，保持放松就好，慢一些，再慢一些

  - date: "2025/10/29"
    tag: "情感反思"
    note: "觉察到在亲密关系中的讨好倾向并寻求平衡。"
    content: |
      我发现我好像被催眠了，我感到很痛苦，我好像在刻意的去讨好我喜欢的人，在用一种很粘人的方式死死抓住对方，慢一点，乐乐，我在的，放松一点，现在是安全的，我好像很害怕失去她，乐乐，慢慢的去寻找平衡，保持放松的姿态

  - date: "2025/10/30"
    tag: "人际交往"
    note: "保持真诚，不卑不亢地交流。"
    content: |
      保持自己的真诚，可以放低姿态，但是不要卑微，大大方方的同比自己厉害的人交流，和自己喜欢的人交流

  - date: "2025/10/31"
    tag: "心态调整"
    note: "释怀对失去的恐惧。"
    content: |
      我到底为什么害怕失去，哈哈哈，本来就没有，光脚不怕穿鞋

  - date: "2025/11/02"
    tag: "认知与实践"
    note: "理论的正确性源于实践和斗争的检验。"
    content: |
      我们说马克思主义是对的，绝不是因为马克思这个人是什么先哲，而是他的理论在我们的实践当中，在我们的斗争当中被证明是对的

  - date: "2025/11/03"
    tag: "技术学习"
    note: "真正的掌握技术是将其内化为工具并知晓使用时机。"
    content: |
      对某个方向技术新的认识和理解，并非简单的学会了某篇论文，而是能够内化成自己手里的武器，知道使用方法和时间，在某个时候能用

  - date: "2025/11/03"
    tag: "关系处理"
    note: "矛盾是增进了解的契机。"
    content: |
      每一次矛盾与问题，都提供了一个让双方走的更近的机会

  - date: "2025/11/06"
    tag: "学习方法"
    note: "反思学习困难的根源。"
    content: |
      学习对大部分人来说是困难的，是不是学习的方法出现了问题，还是教育体系的问题，亦或是我们根本不知道怎么学习？

  - date: "2025/11/06"
    tag: "学习资料"
    note: "寻找难度适宜的学习资料。"
    content: |
      我们接触到的学习资料要么过于简单，要么过于复杂，那到底什么样的资料才是适合的呢

  - date: "2025/11/06"
    tag: "学习体验"
    note: "好的学习方法能带来愉悦感。"
    content: |
      当你学习方法得当，学习会带来愉悦感。达到这种状态是个技术问题

  - date: "2025/11/06"
    tag: "解决问题"
    note: "处理复杂事物的核心在于简化和寻找核心原理。"
    content: |
      面对一个复杂的事物时，我会思考什么才是关键，首要因素是什么，我该如何简化，我该如何找到最能体现核心原理的最简示例，先展现运作机制，再逐步添加其他组件

  - date: "2025/11/06"
    tag: "学习方法"
    note: "费曼技巧，通过讲解来梳理知识。"
    content: |
      向别人讲解，重新梳理清楚整个知识体系

  - date: "2025/11/06"
    tag: "长期主义"
    note: "稳扎稳打才是最快的捷径。"
    content: |
      最好的快是少走弯路，而不是一夜暴富

  - date: "2025/11/06"
    tag: "自我接纳"
    note: "理解自己内心的敏感、控制欲与焦虑。"
    content: |
      你需要的，是学会理解。理解那个总想掌控的自己，理解那份在爱里动辄受伤的敏感，理解那种非得让一切如我所愿的焦虑从何而来。

  - date: "2025/11/06"
    tag: "亲密关系"
    note: "真正的爱是接纳对方的不完美。"
    content: |
      所以亲密的考验，不在于我能否让你变好，而在于我能不能在你的不如我意里，仍然保持爱的能力。

  - date: "2025/11/07"
    tag: "爱情与成长"
    note: "爱情本质上是一种促进双方成长的资源。"
    content: |
      谈恋爱其实也是为了成长，归根结底，它是一种成长资源，我一个人的成长也是成长，然后爱情会提供给我们另外两个人的成长的方式，所以它互相不矛盾

  - date: "2025/11/07"
    tag: "爱情观"
    note: "剥离浪漫滤镜，看清爱情的关系本质。"
    content: |
      爱情是人类文明最大的骗局，爱情只是一种关系

  - date: "2025/11/07"
    tag: "保持开放"
    note: "保持年轻心态，持续更新认知。"
    content: |
      向年轻人学习，避免变得刻板，认知固化

  - date: "2025/11/07"
    tag: "生命力"
    note: "问题与困惑是保持思考和生命力的源泉。"
    content: |
      生命力来自于人生有问题，生活有困惑，我们会不断的思考，不断的求索

  - date: "2025/11/07"
    tag: "面对困境"
    note: "拥抱生活的虚弱感与问题，保持生命活力。"
    content: |
      问题和困惑是一个人生命力的源泉，要保持住面对生活的虚弱感，一个人活在问题中，你就会保持活力，而不是生活在结论中

  - date: "2025/11/07"
    tag: "心理防御"
    note: "觉察亲密关系中的自我保护机制，温柔对待内在小孩。"
    content: |
      不管是在爱情、友情，亦或是其他的亲密关系中，我们哪些固化的重复模式，都是早年间那个聪明的孩子对自己的保护，确保自己可以安全的活到现在，试着去看看那个孩子，等他再来的时候，邀请他坐一会，喝杯饮料，看看他最近是否还好，发生了什么，陪陪他，等他想要离开时，轻松的向他告别，并感激他的到来

  - date: "2025/11/11"
    tag: "工作反思"
    note: "学习他人扎实的基础和独立解决问题的态度。"
    content: |
      看磊哥源码编译vllm所感：磊哥对Linux基本命令非常熟悉，操作快速，而且他不骄不躁（可能是我的感觉），不断查询网页，根据经验查找解决方法，遇到报错先是自己查看，自己解决，无法解决再去使用ai工具，这点我觉得可以学习一下，先自己看，要知道报错是什么，看能不能自己解决，看不懂去问ai。

  - date: "2025/11/13"
    tag: "情绪管理"
    note: "接纳紧张情绪，将其转化为内在动力。"
    content: |
      下次紧张时，试着告诉自己：紧张了，好事，说明我要开始放松了，继续保持这份紧张就好。这叫‘悖论放松’。
      甚至可以把紧张当成‘资源’——谁紧张，说明谁更上心、更认真。你越敢说‘我再紧张一点也没关系’，反而越容易沉下来。

  - date: "2025/11/13"
    tag: "待人处事"
    note: "用心感受和沟通，不急于评判他人。"
    content: |
      不着急给别人下定义，用心去感受，去经营，去沟通，去解决

  - date: "2025/11/13"
    tag: "选择与得失"
    note: "剖析面临选择时患得患失的心理机制。"
    content: |
      我好像明白了为什么一些人在面临选择时候的那种焦虑与痛苦，因为选择意味着得失，人很讨厌这种面临选择的未知感，与其难以得到，不如直接失去，回到原来熟悉的位置，心反而又回归了平静

  - date: "2025/11/15"
    tag: "独立思考"
    note: "寻找适合自己的做事方式。"
    content: |
      不是看了别人怎么操作就照学，找到自己的方式

  - date: "2025/11/16"
    tag: "自我价值"
    note: "珍视自身价值，客观看待他人，不被光环迷惑。"
    content: |
      不管什么时候都要看到自己的价值，珍视自己，看到别人的缺点和优点，不要短时间被对方的光环给迷惑

  - date: "2025/11/16"
    tag: "情感态度"
    note: "暧昧应是情绪的点缀，而非心理负担。"
    content: |
      暧昧带给你的是新鲜感，是让你心情愉悦的辅助，而不应该成为你的负担。

  - date: "2025/11/16"
    tag: "情感分析"
    note: "分析暧昧关系中期待感带来的情绪价值。"
    content: |
      暧昧关系里最让人上头的瞬间，往往是“试探”，是“步步紧逼又后撤”，是将要未要。是半遮半掩。是明知道下一步会发生什么，但没有发生；是预判了下一步的行为，但保持期待。人只有保持期待感，才能始终拥有动力，拥有愉悦的心情。

  - date: "2025/11/16"
    tag: "择偶观"
    note: "感情的核心原则是带来快乐和舒适。"
    content: |
      你选择谁，选择什么样的感情，都遵循一个核心原则：对方能让你快乐，让你舒服，让你乐在其中。

  - date: "2025/11/17"
    tag: "亲密关系"
    note: "追求细水长流的平稳关系。"
    content: |
      将关系融入生活，细水长流
      那么该怎么寻找与发现这种细水长流融入生活的亲密关系呢

  - date: "2025/11/25"
    tag: "情感边界"
    note: "珍惜自己的真诚，将其留给值得的人。"
    content: |
      有限的真诚之水，当灌溉属于它的良田

  - date: "2025/12/04"
    tag: "做事方法"
    note: "先建立通用基础，再进行多领域适配与优化。"
    content: |
      像写作文一样，写出一篇稍微通用一些的作文，然后基于此范文不断的打磨，把一篇作文写成，然后后续在此基础上面进行多领域适配，增资添彩

  - date: "2025/12/10"
    tag: "深度思考"
    note: "掩盖真相的手段往往是制造新的假象。"
    content: |
      掩盖真相就去创造另一个真相

  - date: "2025/12/11"
    tag: "情绪处理"
    note: "直面和经历痛苦，而不是压抑它。"
    content: |
      痛苦，不用压抑，看看他们是什么。带着痛苦去经历现实，痛苦的存在不会吞并我们，没有什么感受是为了吞并我们而存在

  - date: "2025/12/11"
    tag: "目标管理"
    note: "明确大方向，在安全范围内行动，警惕被明确标准绑架。"
    content: |
      定目标，和定大的方向，往正确的方向去走，在能够承受的范围，有一定的安全的事情，就可以去做，如果一件事已经有明确的标准，明确的价值，那你要小心了

  - date: "2025/12/11"
    tag: "个人成长"
    note: "成功需要经历磨砺，动心忍性方能成大事。"
    content: |
      偶然的成功与爆红，是不是命运对你的指引，但是天降大任，必然劳其筋骨，饿其体肤，空乏其身，行拂乱其所为，所以动心忍性，曾益其所不能

  - date: "2025/12/12"
    tag: "人性洞察"
    note: "过度的谦卑可能是一种心理防御机制。"
    content: |
      由这个联想到就是有些人他不管是行为还是从语言上来说，都显得很谦卑，这个实际上也是防御，我不喜欢这样的人，因为要是用爱因斯坦说的那句话，就是这个人可能没有伟大到他需要如此谦卑的程度，这个我相信大家可能也听明白了。
      比如我最近看了一个非常有名的作家的自我介绍，这个作家是让作家们都很佩服的人，是谁我就不说了，他在他的书的扉页上面强调他只不过是一个人而已，跟大家一样。我看了之后，觉得这后面可能有东西，因为也许他潜意识觉得他自己不是个人，他已经到了神那个级别。那当然也有很多人已经把他当成神一样的人，但是我估计我不会，因为我清楚地知道他就是个人，所以不需要强调他就是个人，但是他潜意识里面可能不知不觉会认为自己是一个神，所以他在自我介绍上面呢，需要强调一下自己是一个普通人。这个我不知道我是不是绕得足够清楚了。

  - date: "2025/12/13"
    tag: "职业发展"
    note: "先生存再谈理想，抓住眼前的机会。"
    content: |
      抓住可能的机会，可以进行基本的评估，在没有选择的时候，先干起来，心里那个远大的理想，先珍藏起来，不需要去熄灭他，先抢到一碗饭吃，走下去就有希望

  - date: "2025/12/13"
    tag: "情感支持"
    note: "坚定不移的支持与陪伴。"
    content: |
      不管怎么样，不管发生什么，我都会陪着你，支持你，奋不顾身的出现

  - date: "2025/12/13"
    tag: "进取精神"
    note: "主动创造和把握机会，持续攀登。"
    content: |
      没有机会的时候，就去创造机会，一边去做，一边蛰伏发现机会，当机会来的时候，一把抓住，持续攀登

  - date: "2025/12/14"
    tag: "问题溯源"
    note: "问题的根源在于输入错误或处理步骤错误。"
    content: |
      任何问题的产生只有两个根本原因:要么输入的某个条件发生错误,要么加工处理的某个步骤出现错误。

  - date: "2025/12/14"
    tag: "认知偏差"
    note: "避免思维定势，认清真正的问题所在。"
    content: |
      刘未鹏在《暗时间》中提到:如果你有的是一把锤子,那么所有东西看起来都像钉子。心中有锤就容易被奴役,必须时刻思考面对的真正问题是什么,而不是因为有锤子就只能敲钉子。

  - date: "2025/12/14"
    tag: "生活技巧"
    note: "喷雾定型的正确操作手法。"
    content: |
      有可能是喷的量和次数不对，你如果一次性喷一处头发流向会不自然，糊在一块后被风吹完会被风往下带，最好的方法就是一处一处少量多次且保持半个小臂距离喷，需要纹理定型的地方可以适当提一点起来喷，等待个几秒，最后给全头再定一层就完美

  - date: "2025/12/15"
    tag: "实践出真知"
    note: "实践是养成习惯和新思考方式的唯一途径。"
    content: |
      人们不可能通过思考养成一种实践习惯,而只能够通过实践学会一种新的思考方式。

  - date: "2025/12/16"
    tag: "人际边界"
    note: "他人的喜好是其内在的投射，无需为此内耗。"
    content: |
      他人是否喜欢你，跟他内心的风景有关，和我们本身无关

  - date: "2025/12/16"
    tag: "关系本质"
    note: "好的关系是互相尊重、馈赠与边界交融。"
    content: |
      关系的本质是邀请，不是捕捉；是馈赠，不是交易；是两个世界的接壤处，生长出的第三片沃土——既尊重你的疆域，也尊重我的。

  - date: "2025/12/21"
    tag: "寻找自我"
    note: "拒绝外界干扰，按照自己的节奏找回内在中心。"
    content: |
      乐乐，不要被别人催眠，慢一点，不着急，你也不必向任何人解释，你只是慢慢的回到自己的中心就好了

  - date: "2025/12/22"
    tag: "适应与探索"
    note: "耐心适应未知，而不是急于退回舒适区。"
    content: |
      这就像是在黑暗里耐心等待眼睛适应，而不是立刻点起火把，只照亮熟悉的角落。

  - date: "2025/12/24"
    tag: "自我关怀"
    note: "爱自己是持续的觉醒过程。"
    content: |
      爱己本身就是一场漫长的觉醒，而非一次短暂的自怜。

  - date: "2026/01/02"
    tag: "行动派"
    note: "实践优于内耗，用外部反馈打破思维局限。"
    content: |
      与其悬而未决，不如赶紧试试，拿到外部的reward再去做，过往的经验不一定有用，现在想更多，没有额外的知识输入，就像大模型一样出现幻觉

  - date: "2026/01/07"
    tag: "赚钱与能力"
    note: "赚钱能力是个人综合素质的真实体现。"
    content: |
      这个世界上没有任何事情比赚钱更能真实反应出你的综合能力，这里就包含了你的智商情商胆识为人

  - date: "2026/01/08"
    tag: "自我价值"
    note: "克服羞耻感和自我怀疑是探索世界的前提。"
    content: |
      当一个人不再被羞耻紧紧盯着，不再时时刻刻怀疑自己的价值，他才会慢慢有力量向外看，去真正地学习，链接，去享受生活。

  - date: "2026/01/09"
    tag: "项目开发"
    note: "敏捷开发，先用最小成本验证再逐步升级。"
    content: |
      这也是在实际项目中形成的一个小经验：不要一上来就追求最佳实践，先用最小成本验证方向，确认可行后再逐步升级技术栈。

  - date: "2026/01/09"
    tag: "验证思维"
    note: "低成本试错，确认逻辑后再投入生产。"
    content: |
      先使用最低成本进行基本的验证，确认逻辑没问题后再进行生产化开发

  - date: "2026/01/14"
    tag: "人生哲学"
    note: "追求理性与感性的平衡。"
    content: |
      将古典的理性与浪漫的感性融为一体

  - date: "2026/01/14"
    tag: "关系经营"
    note: "在亲密关系中注入侠义精神与兄弟情谊。"
    content: |
      在关系中增加一些义气，兄弟义气，江湖义气，侠义之气，想想怎么对待自己的兄弟，适当的把这些东西带到自己的亲密关系

  - date: "2026/01/17"
    tag: "自我认同"
    note: "建立内在评价体系，不被外界标准左右。"
    content: |
      找到自己的评价体系，为自己的评价体系去奋斗，去让自己开心
      找到自己的评价体系，而不是其他的制定的评价体系

  - date: "2026/01/18"
    tag: "亲密关系"
    note: "用包容的心态看待伴侣的失误。"
    content: |
      当伴侣搞砸了什么事时，我们要尽量将其归结于暂时的、外部的、特定的因素，而非永久的、内在的、普遍的人格缺陷。

  - date: "2026/01/18"
    tag: "情绪价值"
    note: "给予伴侣恰当的情感支持与陪伴。"
    content: |
      在对方脆弱时，不追问、不说教；在对方犯错时，不指责、不翻旧账；在对方低谷时，不催促、不施压。

  - date: "2026/01/19"
    tag: "职业反思"
    note: "反思写代码的目的和对编程的真实热爱程度。"
    content: |
      我的在写代码方面真的热爱吗，做的怎么样呢，写代码的目的是什么呢，我为什么要写代码？

  - date: "2026/01/19"
    tag: "职业认知"
    note: "承认代码只是实现想法和解决问题的工具，而非终极目的。"
    content: |
      我并不真正的热爱编程，在面对比较难的问题的时候，我常常不知道怎么写，诚实的来说，写的很一般，我写代码的目的我认为可以分为两个大点：第一就是我可以自己动手实现一些应用，不断的去挑战，我感觉很有趣，第二点就是他可以为我带来收益，能够找到一份好的工作。那么我为什么要写代码呢，好像写代码并不是目的，代码只是一个工具，用来实现我内心的想法，以及解决实际的问题，如果这个问题解决需要我亲自来写代码，那么我会去学习如何把这个代码写好，核心的目的就是做出自己满意的产品，解决实际的问题，至于代码是我亲自来写，还是我让AI帮我写，我的目的都达到了

