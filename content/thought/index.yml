  - date: "2026/04/03"
    tag: "多邻国员工手册"
    note: "进步是螺旋式的，不一定是比昨天更好，但一定是比之前更好。"
    content: 当然，我们也是人，难免会犯错。当错误发生时，我们不会追究责任，而是深入分析，找出问题所在。这就是我们如何持续提升标准的方法。不是追求完美，而是每天变得比昨天更好一点点。

  - date: "2026/04/04"
    tag: "多邻国员工手册"
    note: "找到自己产品营销的风格"
    content: 起初，我们试图迎合尽可能广泛的受众，但结果却是毫无特色。在营销中，没有什么比平淡无奇更糟糕。因此，我们调整了方向，让我们的营销风格变得古怪、出人意料且常常充满幽默。

  - date: "2026/04/05"
    tag: "毛选"
    note: "如何判断我们有没有和敌人划清界限了？"
    content: 我认为，对我们来说，一个人，一个党，一个军队，或者一个学校，如若不被敌人反对，那就不好了，那一定是同敌人同流合污了。如若被敌人反对，那就好了，那就证明我们同敌人划清界限了。如若敌人起劲的反对我们，把我们说的一塌糊涂、一无是处，那就更好了，那就证明了我们不但同敌人划清了界限而且证明我们的工作是很有成绩的了。


































